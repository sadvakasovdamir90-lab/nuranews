<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Администратора | NuraNews</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }, colors: { nura: { 500: '#2563eb', 600: '#1d4ed8', 900: '#0f172a', 950: '#020617' } } } } }
    </script>
</head>
<body class="bg-slate-50 dark:bg-nura-950 text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <!-- 🔔 ӘДЕМІ УВЕДОМЛЕНИЕ (TOAST) КОНТЕЙНЕРІ -->
    <div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-3"></div>

    <header class="bg-nura-900 text-white px-6 py-4 sticky top-0 z-50 shadow-lg border-b border-nura-800">
        <div class="max-w-6xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-nura-600 flex items-center justify-center shadow-inner">
                    <i class="fas fa-user-shield"></i>
                </div>
                <div>
                    <h1 class="text-xl font-[800] tracking-tight uppercase leading-none">NuraNews Admin</h1>
                    <p class="text-[10px] text-nura-300 uppercase tracking-widest mt-1">Панель управления</p>
                </div>
            </div>
            <a href="profile.html" class="px-4 py-2 bg-white/10 hover:bg-white/20 rounded-lg text-xs font-bold uppercase tracking-wider transition-colors flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> В кабинет
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-10">
        <div class="mb-8 flex justify-between items-end border-b border-slate-200 dark:border-slate-800 pb-4">
            <div>
                <h2 class="text-3xl font-[800] text-slate-900 dark:text-white">Пользователи</h2>
                <p class="text-sm text-slate-500 mt-1">Управление верификацией и статусами пользователей портала.</p>
            </div>
            <div class="text-right">
                <span id="users-count" class="text-2xl font-[900] text-nura-600 dark:text-nura-400">0</span>
                <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Всего</p>
            </div>
        </div>

        <div id="loading-spinner" class="flex flex-col justify-center items-center py-20 text-slate-400">
            <i class="fas fa-spinner fa-spin text-4xl mb-4"></i>
            <span class="text-xs font-bold uppercase tracking-widest">Загрузка базы данных...</span>
        </div>

        <!-- ҚОЛДАНУШЫЛАР ТІЗІМІ -->
        <div id="users-container" class="grid grid-cols-1 md:grid-cols-2 gap-6 empty:hidden">
            <!-- Бұл жерге JS арқылы қолданушылар түседі -->
        </div>
    </main>

    <!-- TOAST ХАБАРЛАМА ФУНКЦИЯСЫ -->
    <script>
        window.showToast = function(type, message) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            const isSuccess = type === 'success';
            toast.className = `flex items-center gap-3 px-6 py-4 rounded-2xl shadow-2xl transform transition-all duration-300 translate-x-full ${isSuccess ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            toast.innerHTML = `<i class="${isSuccess ? 'fas fa-check-circle' : 'fas fa-exclamation-circle'} text-2xl"></i><p class="text-sm font-bold tracking-wide">${message}</p>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3500);
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCT2EKhuT9AcMTEMpEAXEtqcFiGJIJTPtQ",
            authDomain: "nuranews-2177c.firebaseapp.com",
            projectId: "nuranews-2177c",
            storageBucket: "nuranews-2177c.firebasestorage.app",
            messagingSenderId: "960132468347",
            appId: "1:960132468347:web:0fdc35cda6b7ae1a1d5cde"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🔥 ӨТЕ МАҢЫЗДЫ: МЫНА ЖЕРГЕ ӨЗІҢНІҢ GOOGLE ПОЧТАҢДЫ ЖАЗ! 
        // Тек осы почтамен кірген адам ғана админ-панельді көре алады.
        const ADMIN_EMAIL = "domnex00@gmail.com"; 

        document.addEventListener('DOMContentLoaded', () => {
            // Қауіпсіздік тексерісі
            onAuthStateChanged(auth, async (user) => {
                if (user && user.email === ADMIN_EMAIL) {
                    // Егер админ болса, деректерді жүктейміз
                    loadUsers();
                } else {
                    // Басқа адам кірсе, қуып шығамыз
                    alert("⛔ У вас нет прав администратора для доступа к этой странице!");
                    window.location.href = "index.html";
                }
            });
        });

        async function loadUsers() {
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                const usersContainer = document.getElementById('users-container');
                document.getElementById('loading-spinner').classList.add('hidden');
                
                let usersCount = 0;
                usersContainer.innerHTML = '';

                querySnapshot.forEach((docSnap) => {
                    usersCount++;
                    const userData = docSnap.data();
                    const userId = docSnap.id;
                    const isVerified = userData.isVerified || false;

                    // Көк галочка дизайны
                    const verifiedBadge = isVerified 
                        ? `<i class="fas fa-check-circle text-blue-500 ml-2" title="Верифицирован"></i>` 
                        : '';
                    
                    const cardHTML = `
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-3xl shadow-sm flex items-center justify-between transition-all hover:shadow-md">
                        <div class="flex items-center gap-4">
                            <img src="${userData.photoURL || 'https://ui-avatars.com/api/?name=User'}" class="w-14 h-14 rounded-full object-cover border border-slate-200 dark:border-slate-700 shadow-sm">
                            <div>
                                <h3 class="text-sm font-[800] text-slate-900 dark:text-white flex items-center">${userData.name || 'Без имени'} ${verifiedBadge}</h3>
                                <p class="text-[10px] text-slate-500 mt-1"><i class="fas fa-envelope mr-1"></i> ${userData.email || 'Нет почты'}</p>
                                <p class="text-[10px] text-slate-500"><i class="fas fa-phone mr-1"></i> ${userData.phone || 'Нет телефона'}</p>
                            </div>
                        </div>
                        
                        <!-- Верификация Қосқышы (Toggle) -->
                        <div class="flex flex-col items-center gap-1">
                            <span class="text-[9px] font-bold uppercase tracking-widest ${isVerified ? 'text-blue-500' : 'text-slate-400'}">Проверен</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer verify-toggle" data-uid="${userId}" ${isVerified ? 'checked' : ''}>
                                <div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-blue-500 shadow-inner"></div>
                            </label>
                        </div>
                    </div>`;
                    
                    usersContainer.insertAdjacentHTML('beforeend', cardHTML);
                });

                document.getElementById('users-count').innerText = usersCount;

                // Тогглдарға (қосқыштарға) оқиға қосу
                document.querySelectorAll('.verify-toggle').forEach(toggle => {
                    toggle.addEventListener('change', async (e) => {
                        const uid = e.target.getAttribute('data-uid');
                        const newStatus = e.target.checked;
                        
                        // Батырманы уақытша бұғаттаймыз
                        e.target.disabled = true;

                        try {
                            const userRef = doc(db, "users", uid);
                            await updateDoc(userRef, { isVerified: newStatus });
                            
                            window.showToast('success', newStatus ? '✅ Пользователь верифицирован!' : '❌ Верификация снята!');
                            
                            // Жаңартқан соң тізімді қайта жүктейміз
                            setTimeout(() => { loadUsers(); }, 1000);
                        } catch (error) {
                            console.error("Ошибка обновления:", error);
                            window.showToast('error', 'Ошибка! Проверьте правила базы данных.');
                            e.target.checked = !newStatus; // Қате болса қалпына келтіру
                        } finally {
                            e.target.disabled = false;
                        }
                    });
                });

            } catch (error) {
                console.error("Ошибка загрузки:", error);
                document.getElementById('loading-spinner').innerHTML = '<span class="text-red-500 font-bold">Ошибка соединения с Firebase!</span>';
            }
        }
    </script>
</body>
</html>
